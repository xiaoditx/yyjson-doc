name: Doxygen Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths: ['**']
  pull_request:
    branches: [ main, master ]
    paths: ['**']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Doxygen
        run: |
          # 1. 定义版本和下载链接（这里使用1.10.0）
          DOXYGEN_VERSION="1.10.0"
          DOWNLOAD_URL="https://github.com/doxygen/doxygen/releases/download/Release_1_10_0/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"

          # 2. 下载、解压
          wget -O doxygen.tar.gz $DOWNLOAD_URL
          tar -xzf doxygen.tar.gz

          # 3. 进入目录并安装（sudo make install 会将二进制文件复制到 /usr/local/bin）
          cd doxygen-${DOXYGEN_VERSION}
          sudo make install

          # 4. 验证版本
          doxygen --version

      - name: Install Graphviz
        run: |
          sudo apt update
          sudo apt install -y graphviz

      - name: Build Doxygen documentation
        run: |
          # 提前创建 yyjson 目录（Doxygen 无法自动创建）
          mkdir -p yyjson
          # 执行构建（生成到 yyjson/html）
          doxygen Doxyfile.in
          # 验证核心文件是否存在
          if [ ! -f "yyjson/html/index.html" ]; then
            echo "Error: index.html not found in yyjson/html!"
            exit 1
          fi
          # 查看产物结构
          ls -la yyjson/html/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传
          path: 'yyjson/html'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        # 移除无效的 target_path 参数
      - name: Debug Doxygen config
        run: |
          doxygen -v
          grep -E '^(MARKDOWN_SUPPORT|FILTER_PATTERNS)' Doxyfile.in